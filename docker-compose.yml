services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: truflow_booking_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d truflow_booking_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/truflow_booking_dev?schema=public
      STRIPE_SECRET_KEY: sk_test_placeholder
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
      RESEND_API_KEY: re_placeholder
      NEXTAUTH_SECRET: dev_secret
      WEBHOOK_URL_TOKEN: dev_webhook_token
      REDIS_URL: redis://redis:6379
      NEXT_PUBLIC_API_URL: http://localhost:3000
    ports:
      - "3000:3000"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/truflow_booking_dev?schema=public
      STRIPE_SECRET_KEY: sk_test_placeholder
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
      RESEND_API_KEY: re_placeholder
      NEXTAUTH_SECRET: dev_secret
      WEBHOOK_URL_TOKEN: dev_webhook_token
      REDIS_URL: redis://redis:6379
      NEXT_PUBLIC_API_URL: http://localhost:3000

volumes:
  postgres-data:

